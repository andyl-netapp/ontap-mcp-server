image: alpine/git

pipelines:
  default:
    - step:
        name: Mirror to GitHub
        script:
          - git fetch --all
          - git config --global http.sslVerify false
          - git config --global credential.helper store
          - printf 'https://x-access-token:%s@github.com\n' "${GITHUB_PAT}" >> ~/.git-credentials
          - git remote add github "https://github.com/andyl-netapp/${BITBUCKET_REPO_SLUG}.git" 2>/dev/null || git remote set-url github "https://github.com/andyl-netapp/${BITBUCKET_REPO_SLUG}.git"
          - git push github --mirror --force