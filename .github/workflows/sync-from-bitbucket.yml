name: Sync from Bitbucket
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GIT_SSL_NO_VERIFY: "true"
    steps:
      - name: Mirror Bitbucket to GitHub
        env:
          BITBUCKET_TOKEN: ${{ secrets.BITBUCKET_TOKEN }}
        run: |
          ENCODED_TOKEN=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['BITBUCKET_TOKEN'], safe=''))")
          git clone --mirror "https://andyl:${ENCODED_TOKEN}@bitbucket.ngage.netapp.com/scm/~andyl/ontap-mcp-server.git" repo.git
          cd repo.git
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/andyl-netapp/ontap-mcp-server.git"
          git push --mirror --force